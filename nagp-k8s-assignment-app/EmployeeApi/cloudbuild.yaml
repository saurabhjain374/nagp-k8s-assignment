steps:
- name: 'gcr.io/cloud-builders/docker'
  entrypoint: 'bash'
  secretEnv:
    - DOCKER_USERNAME
    - DOCKER_PASSWORD
  args:
    - '-c'
    - |
      echo "$$DOCKER_PASSWORD" | docker login -u "$$DOCKER_USERNAME" --password-stdin
      docker build -t $$DOCKER_USERNAME/employee-api:v2 .
      docker push $$DOCKER_USERNAME/employee-api:v2

availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/dockerhub-username/versions/latest
    env: DOCKER_USERNAME
  - versionName: projects/$PROJECT_ID/secrets/dockerhub-token/versions/latest
    env: DOCKER_PASSWORD