apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-api
  namespace: nagp-assignment
spec:
  replicas: 4

  strategy:
    type: RollingUpdate

  selector:
    matchLabels:
      app: employee-api

  template:
    metadata:
      labels:
        app: employee-api

    spec:
      containers:
      - name: employee-api
        image: saurabhjain374/employee-api:v2
        imagePullPolicy: Always

        ports:
        - containerPort: 8080

        # Add these probes
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3

        env:
        
        # From ConfigMap (non-sensitive)
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: postgres-config
              key: DB_HOST

        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: postgres-config
              key: DB_PORT

        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: postgres-config
              key: POSTGRES_DB

        # From Secret (sensitive)
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER

        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD

        # From API ConfigMap
        - name: APP_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: APP_ENVIRONMENT

        - name: APP_VERSION
          valueFrom:  
            configMapKeyRef:
              name: api-config
              key: APP_VERSION

        resources:
          requests:
            cpu: "50m"
            memory: "256Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"